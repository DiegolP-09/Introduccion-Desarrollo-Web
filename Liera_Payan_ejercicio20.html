<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ejercicio #20 - Operaciones con JavaScript</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 5px;
    }

    p.subtitulo {
      color: #555;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .variables {
      background: #f5f5f5;
      border: 1px solid #ccc;
      padding: 10px 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-family: monospace;
      font-size: 0.95rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px 14px;
      text-align: left;
    }

    th {
      background: #e8e8e8;
      font-weight: bold;
    }

    tr:nth-child(even) {
      background: #f9f9f9;
    }

    td:last-child {
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Ejercicio #20 - Operaciones Matemáticas</h1>
  <p class="subtitulo">Declaración de variables y operaciones con JavaScript</p>

  <div class="variables">
    <div>let a = <span id="show-a"></span>;</div>
    <div>let b = <span id="show-b"></span>;</div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Operación</th>
        <th>Expresión</th>
        <th>Resultado</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Suma</td>
        <td>a + b</td>
        <td id="res-suma"></td>
      </tr>
      <tr>
        <td>Resta</td>
        <td>a - b</td>
        <td id="res-resta"></td>
      </tr>
      <tr>
        <td>División</td>
        <td>a / b</td>
        <td id="res-div"></td>
      </tr>
      <tr>
        <td>Exponenciación</td>
        <td>a ** b</td>
        <td id="res-exp"></td>
      </tr>
    </tbody>
  </table>

  <script>
    // Declaración de variables
    let a = 12;
    let b = 4;

    // Operaciones
    let suma           = a + b;
    let resta          = a - b;
    let division       = a / b;
    let exponenciacion = a ** b;

    // Mostrar en la página
    document.getElementById('show-a').textContent = a;
    document.getElementById('show-b').textContent = b;

    document.getElementById('res-suma').textContent  = suma;
    document.getElementById('res-resta').textContent = resta;
    document.getElementById('res-div').textContent   = division;
    document.getElementById('res-exp').textContent   = exponenciacion;
  </script>

</body>
</html>
