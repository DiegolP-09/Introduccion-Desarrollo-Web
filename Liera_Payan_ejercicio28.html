<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio #28 – Conversor de Temperatura</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f2;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 2rem 2.4rem;
      width: 100%;
      max-width: 420px;
    }

    /* Encabezado */
    .tag {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #999;
      margin-bottom: .4rem;
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: .3rem;
    }

    .desc {
      font-size: .82rem;
      color: #777;
      margin-bottom: 1.4rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #efefef;
    }

    /* Formulario */
    label {
      display: block;
      font-size: .82rem;
      color: #555;
      margin-bottom: .35rem;
    }

    input[type="number"] {
      width: 100%;
      padding: .6rem .8rem;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: .95rem;
      background: #fafafa;
      outline: none;
      margin-bottom: 1rem;
      transition: border-color .15s;
    }

    input[type="number"]:focus {
      border-color: #1a1a1a;
      background: #fff;
    }

    button {
      width: 100%;
      background: #1a1a1a;
      color: #fff;
      border: none;
      padding: .65rem;
      border-radius: 6px;
      font-size: .9rem;
      cursor: pointer;
      transition: background .15s;
    }

    button:hover { background: #333; }

    /* Resultado */
    .resultado {
      margin-top: 1.2rem;
      background: #f4f4f2;
      border-left: 3px solid #1a1a1a;
      border-radius: 5px;
      padding: .9rem 1rem;
      font-size: .95rem;
      color: #1a1a1a;
      display: none;
    }

    .resultado.visible { display: block; }

    /* Fórmula */
    .formula {
      margin-top: 1.4rem;
      padding-top: 1rem;
      border-top: 1px solid #efefef;
      font-size: .78rem;
      color: #999;
    }

    .formula code {
      background: #f0f0ee;
      padding: .1rem .35rem;
      border-radius: 3px;
      font-size: .78rem;
      color: #444;
    }

    footer {
      margin-top: 1.5rem;
      font-size: .72rem;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="card">
    <p class="tag">Ejercicio #28 · JavaScript</p>
    <h1>Conversor de Temperatura</h1>
    <p class="desc">Convierte grados Celsius a Fahrenheit.</p>

    <!-- Formulario -->
    <label for="celsius">Temperatura en Celsius (°C)</label>
    <input type="number" id="celsius" step="any" placeholder="Ej. 25">

    <button onclick="convertir()">Convertir</button>

    <!-- Resultado -->
    <div class="resultado" id="resultado"></div>

    <!-- Fórmula -->
    <div class="formula">
      Fórmula: <code>Fahrenheit = Celsius × 9/5 + 32</code>
    </div>
  </div>

  <footer>Ejercicio #28 · Programación Web · Conversor de temperatura</footer>

  <script>
    function convertir() {
      let celsius = parseFloat(document.getElementById('celsius').value);

      // Validación
      if (isNaN(celsius)) {
        mostrar('Por favor ingresa un valor numérico.');
        return;
      }

      // Fórmula
      let fahrenheit = celsius * 9 / 5 + 32;

      // Formato de salida exacto requerido: "25 Celsius = 77.0 Fahrenheit"
      let resultado = celsius + ' Celsius = ' + fahrenheit.toFixed(1) + ' Fahrenheit';

      mostrar(resultado);
    }

    function mostrar(texto) {
      let el = document.getElementById('resultado');
      el.textContent = texto;
      el.classList.add('visible');
    }

    // Permitir presionar Enter
    document.getElementById('celsius').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') convertir();
    });
  </script>

</body>
</html>
